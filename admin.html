<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Driver Admin 🚖</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#000;
  color:white;
  padding:20px;
}

.card{
  background:#222;
  padding:20px;
  margin-top:20px;
  border-radius:15px;
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🚖 ADMIN</h1>

<div id="reader"></div>
<div id="info"></div>

<script>

let pass = prompt("Пароль:");

if(pass !== "1234"){
  document.body.innerHTML = "<h1>Нема доступу ❌</h1>";
}

function show(order, key){
  document.getElementById("info").innerHTML = `
    <div class="card">
      <h2>${order.name}</h2>
      <p>📍 ${order.from}</p>
      <p>🏁 ${order.to}</p>
      <h3 id="status">${order.status}</h3>

      <button onclick="update('${key}','🚖 Приїхав')">Приїхав</button>
      <button onclick="update('${key}','👤 Забрав')">Забрав</button>
      <button onclick="update('${key}','⏳ Чекаю')">Чекаю</button>
      <button onclick="update('${key}','✅ Довіз')">Довіз</button>
      <button onclick="update('${key}','💵 Оплачено')">Оплачено</button>
    </div>
  `;
}

function update(key,status){
  let o = JSON.parse(localStorage.getItem(key));
  o.status = status;
  localStorage.setItem(key, JSON.stringify(o));
  document.getElementById("status").innerText = status;
}

function onScan(decodedText){
  let data = localStorage.getItem(decodedText);
  if(!data){
    alert("Нема замовлення");
    return;
  }
  show(JSON.parse(data), decodedText);
}

let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
scanner.render(onScan);

</script>

</body>
</html>
