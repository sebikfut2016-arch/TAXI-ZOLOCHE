<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Driver PRO MAX 🚖</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:Arial;
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
}

.card{
  background:#222;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🚖 DRIVER PRO MAX</h1>

<div id="list"></div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔐 пароль
if(prompt("Пароль") !== "1234"){
  document.body.innerHTML = "❌ Нема доступу";
}

// 👤 водій
let driverName = prompt("Ім'я водія:");
if(!driverName){
  document.body.innerHTML = "Нема водія";
}

// 🔥 LIVE всі замовлення
db.collection("orders").onSnapshot(snapshot => {

  let html = "";

  snapshot.forEach(doc => {
    let o = doc.data();

    html += `
      <div class="card">
        <h3>${o.name}</h3>
        <p>${o.from} → ${o.to}</p>
        <b>${o.status}</b><br>
        <small>🚖 ${o.driver || "нема водія"}</small>

        <br><br>

        <button onclick="take('${o.id}','${o.driver}')">🚖 Прийняти</button>
        <button onclick="update('${o.id}','👤 Забрав')">Забрав</button>
        <button onclick="update('${o.id}','🚖 Приїхав')">Приїхав</button>
        <button onclick="update('${o.id}','⏳ Чекаю')">Чекаю</button>
        <button onclick="update('${o.id}','✅ Довіз')">Довіз</button>
      </div>
    `;
  });

  list.innerHTML = html;

});

// 🚖 прийняти (тільки 1 водій)
function take(id,currentDriver){

  if(currentDriver){
    alert("Вже взято ❌");
    return;
  }

  db.collection("orders").doc(id).update({
    driver: driverName,
    status: "🚖 Прийнято"
  });
}

// 🔄 статуси
function update(id,status){
  db.collection("orders").doc(id).update({
    status: status
  });
}

</script>

</body>
</html>
