<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>TAXI ZOLOCHE 🚖</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:#fff;
  padding:20px;
}

input,button{
  width:85%;
  padding:12px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  background:yellow;
  font-weight:bold;
  cursor:pointer;
}

#statusBox{
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🚖 TAXI ZOLOCHE PRO MAX</h1>

<input id="name" placeholder="Ім'я">
<input id="from" placeholder="Звідки">
<input id="to" placeholder="Куди">

<button onclick="createOrder()">Замовити</button>

<h3 id="msg"></h3>
<div id="statusBox"></div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentOrderId = null;

function createOrder(){

  let id = "order_" + Date.now();
  currentOrderId = id;

  db.collection("orders").doc(id).set({
    id,
    name: name.value,
    from: from.value,
    to: to.value,
    status: "🟡 Очікує",
    driver: null
  });

  msg.innerText = "Замовлення створено 🚖";

  listenStatus(id);
}

// 🔥 LIVE статус для клієнта
function listenStatus(id){

  db.collection("orders").doc(id).onSnapshot(doc => {

    let o = doc.data();
    if(!o) return;

    statusBox.innerHTML = `
      <div style="background:#222;padding:15px;border-radius:15px;margin-top:20px">
        <p>📍 ${o.from} → ${o.to}</p>
        <h2>${o.status}</h2>
        <p>🚖 Водій: ${o.driver || "ще не прийнято"}</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
