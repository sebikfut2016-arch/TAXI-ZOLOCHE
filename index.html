<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тато Артур 🎉</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0d0d0d;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

.box{
    max-width:700px;
    background:#1b1b1b;
    padding:30px;
    border-radius:20px;
    border:2px solid #00ff88;
    box-shadow:0 0 25px rgba(0,255,136,0.3);
}

h1{
    color:#00ff88;
    font-size:48px;
}

p{
    font-size:18px;
}

button{
    margin-top:20px;
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:#00ff88;
    color:black;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

.card{
    display:none;
    margin-top:25px;
    padding:20px;
    background:#2a2a2a;
    border-radius:15px;
    animation:fade 0.4s ease;
}

.money{
    font-size:42px;
    margin:20px 0;
    color:#00ff88;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="box">

<h1>🎉 ТАТО АРТУР 🎉</h1>

<p>
Найкращий тато ever 😎
</p>

<button id="btn1">
Натисни для сюрпризу 🚀
</button>

<div class="card" id="card1">

<h2 id="text"></h2>

<p>
Ти легенда сім'ї 💪<br>
Дякую за все 🔥
</p>

<button id="btn2">
Ще один сюрприз 👀
</button>

</div>

<div class="card" id="card2">

<h2>🎁 SURPRISE UNLOCKED 🎁</h2>

<div class="money">
💸 +300 грн
</div>

<p>
На твою картку летить подарунок 😄
</p>

</div>

</div>

<script>
const compliments = [
    "👑 FAMILY BOSS",
    "🔥 LEGENDARY DAD",
    "😎 TOP TIER ТАТО",
    "🏆 BEST DAD",
    "💪 MAXIMUM RESPECT",
    "🚀 PREMIUM HUMAN"
];

document.getElementById("btn1").addEventListener("click", function(){

    const random =
    compliments[Math.floor(Math.random()*compliments.length)];

    document.getElementById("text").innerHTML = random;

    document.getElementById("card1").style.display = "block";
});

document.getElementById("btn2").addEventListener("click", function(){

    document.getElementById("card2").style.display = "block";
});
</script>

</body>
</html>
